worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # structured JSON access log - easier to parse with promtail / fluentd
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_response_time":"$upstream_response_time",'
            '"x_request_id":"$http_x_request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout 65;
    server_tokens     off;   # don't leak nginx version in error pages

    # gzip text responses - cuts bandwidth ~70% for JSON APIs
    gzip on;
    gzip_types application/json text/plain application/xml;
    gzip_min_length 1024;

    # upstream pool - nginx picks the server with the fewest active connections
    # add more app_N entries as you scale replicas
    upstream app_backend {
        least_conn;
        server app:8080 max_fails=3 fail_timeout=30s;

        # health-checked keepalive connections to the app
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # security headers
        add_header X-Content-Type-Options  nosniff;
        add_header X-Frame-Options         SAMEORIGIN;
        add_header X-XSS-Protection        "1; mode=block";

        # propagate the original client IP to the app
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # keep-alive to upstream (matches server keepalive setting)
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # reasonable proxy timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout    15s;
        proxy_read_timeout    15s;

        # liveness / readiness probes bypass rate limiting
        location /healthz {
            proxy_pass http://app_backend;
            access_log off;
        }

        location /readyz {
            proxy_pass http://app_backend;
            access_log off;
        }

        # block external access to /metrics - only prometheus (internal) should scrape it
        location /metrics {
            allow 172.0.0.0/8;   # docker internal network
            allow 10.0.0.0/8;    # k8s pod network
            deny  all;
            proxy_pass http://app_backend;
        }

        # main application traffic
        location / {
            proxy_pass http://app_backend;
        }
    }
}
