# local dev stack - starts the app, nginx, prometheus, and grafana
# run: docker compose up -d
# app is reachable at http://localhost (port 80 via nginx)

services:
    app:
        build:
            context: ..
            dockerfile: Dockerfile
        restart: unless-stopped
        environment:
            PORT: '8080'
            ENV: development
            APP_VERSION: 'dev'
        expose:
            - '8080'
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'wget -qO- http://localhost:8080/healthz || exit 1',
                ]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 5s
        networks:
            - internal

    nginx:
        build:
            context: ./nginx
            dockerfile: Dockerfile
        restart: unless-stopped
        ports:
            - '80:80'
        depends_on:
            app:
                condition: service_healthy
        networks:
            - internal

    prometheus:
        image: prom/prometheus:v2.51.0
        restart: unless-stopped
        volumes:
            - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus_data:/prometheus
        command:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.retention.time=7d'
        ports:
            - '9090:9090'
        networks:
            - internal

    grafana:
        image: grafana/grafana:10.4.0
        restart: unless-stopped
        environment:
            GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
            GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-changeme}
            GF_USERS_ALLOW_SIGN_UP: 'false'
        volumes:
            - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
            - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
            - grafana_data:/var/lib/grafana
        ports:
            - '3000:3000'
        depends_on:
            - prometheus
        networks:
            - internal

networks:
    internal:
        driver: bridge

volumes:
    prometheus_data:
    grafana_data:
