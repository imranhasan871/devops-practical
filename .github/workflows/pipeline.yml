name: CI/CD Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  GO_VERSION: "1.22"
  # DigitalOcean Container Registry endpoint
  REGISTRY: registry.digitalocean.com
  # must match terraform var registry_name
  REGISTRY_NAME: ${{ secrets.DO_REGISTRY_NAME }}

jobs:
  # ------------------------------------------------------------------ #
  #  test - runs on every push and pull request                         #
  # ------------------------------------------------------------------ #
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  # ------------------------------------------------------------------ #
  #  build-image - only on pushes (not PRs), after tests pass           #
  # ------------------------------------------------------------------ #
  build-image:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.image-tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Set image tag
        id: image-tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/api:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest=${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/api:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image-tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/api:latest
          build-args: |
            APP_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build and push nginx image
        uses: docker/build-push-action@v5
        with:
          context: ./infra/nginx
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/nginx:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/nginx:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # remove untagged images so we don't burn through registry storage
      - name: Remove stale registry images
        run: doctl registry garbage-collection start --include-untagged-manifests --force ${{ env.REGISTRY_NAME }}

  # ------------------------------------------------------------------ #
  #  deploy - only runs on main branch after image is built             #
  #                                                                     #
  #  Zero-downtime strategy:                                            #
  #    The DigitalOcean Load Balancer health-checks each Droplet.       #
  #    We deploy one Droplet at a time. After each container restarts   #
  #    and passes /healthz, we move on to the next Droplet.             #
  #    At no point are all Droplets updating simultaneously.            #
  # ------------------------------------------------------------------ #
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: build-image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Get Droplet IPs
        id: droplets
        run: |
          # fetch IPs of all Droplets tagged "app"
          ips=$(doctl compute droplet list --tag-name app --format PublicIPv4 --no-header | tr '\n' ' ')
          echo "ips=$ips" >> "$GITHUB_OUTPUT"

      - name: Rolling deploy to each Droplet
        env:
          IMAGE_TAG: ${{ needs.build-image.outputs.image_tag }}
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          echo "$SSH_PRIVATE_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          for ip in ${{ steps.droplets.outputs.ips }}; do
            echo "--- deploying to $ip ---"

            ssh -i /tmp/deploy_key \
                -o StrictHostKeyChecking=no \
                -o ConnectTimeout=10 \
                root@$ip \
                "IMAGE_TAG=${IMAGE_TAG} bash /opt/devops-practical/infra/scripts/deploy.sh"

            echo "--- $ip deployed and healthy ---"
          done

          rm -f /tmp/deploy_key

      - name: Verify load balancer health
        run: |
          LB_IP=$(doctl compute load-balancer list --format IP --no-header | head -1)
          for i in $(seq 1 15); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "http://${LB_IP}/healthz" || echo "000")
            if [ "$status" = "200" ]; then
              echo "load balancer health check passed"
              exit 0
            fi
            echo "attempt $i: status $status, retrying..."
            sleep 5
          done
          echo "load balancer health check failed"
          exit 1
