name: CI/CD Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  GO_VERSION: "1.22"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/devops-practical

jobs:
  # ------------------------------------------------------------------ #
  #  test                                                               #
  # ------------------------------------------------------------------ #
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  # ------------------------------------------------------------------ #
  #  build-image                                                        #
  # ------------------------------------------------------------------ #
  build-image:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.image-tag.outputs.tag }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: image-tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=${{ env.IMAGE_PREFIX }}/api:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image-tag.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/api:latest
          build-args: |
            APP_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build and push nginx image
        uses: docker/build-push-action@v5
        with:
          context: ./infra/nginx
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/nginx:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/nginx:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ------------------------------------------------------------------ #
  #  deploy                                                             #
  # ------------------------------------------------------------------ #
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: build-image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Get Droplet IP
        id: droplet
        run: |
          ip=$(doctl compute droplet list --tag-name app --format PublicIPv4 --no-header | head -1)
          echo "ip=$ip" >> "$GITHUB_OUTPUT"

      - name: Deploy to Droplet
        env:
          IMAGE_TAG: ${{ needs.build-image.outputs.image_tag }}
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DROPLET_IP: ${{ steps.droplet.outputs.ip }}
        run: |
          echo "$SSH_PRIVATE_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              root@$DROPLET_IP \
              "IMAGE_TAG=${IMAGE_TAG} bash /opt/devops-practical/infra/scripts/deploy.sh"

          rm -f /tmp/deploy_key

      - name: Verify deployment
        run: |
          ip=${{ steps.droplet.outputs.ip }}
          for i in $(seq 1 15); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "http://${ip}/healthz" || echo "000")
            if [ "$status" = "200" ]; then
              echo "deployment verified"
              exit 0
            fi
            echo "attempt $i: status $status, retrying..."
            sleep 5
          done
          echo "deployment verification failed"
          exit 1
